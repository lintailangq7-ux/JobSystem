<!DOCTYPE html>

<title>学生一覧</title>
<style>
  body {
    font-family: "MS PGothic", "Meiryo", sans-serif;
    background: #ffffff;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    position: relative;
  }
 
  /* header */
  .header-row {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
  }
  .title-box {
    display: flex;
    align-items: center;
    border: 1px solid #999;
    width: 300px;
    height: 60px;
  }
  .title-arrow {
    width: 60px;
    height: 100%;
    background: #29ABE2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .title-arrow svg { width: 30px; height: 30px; }
  .title-text {
    font-size: 20px;
    font-weight: bold;
    margin-left: 14px;
  }
 
  .search-box {
    display: inline-block;
    border: 2px solid #29abe2; /* 外側の青い丸枠 */
    border-radius: 20px;
    padding: 4px 8px;
  }

  .search-box input {
    border: none;       /* 内側の枠線を消す */
    outline: none;       /* フォーカス時の青い枠も消す */
    background: transparent;
    font-size: 14px;
  }

  /* table */
  table {
    border-collapse: collapse;
    width: 100%;
  }
  th {
    background: #1f5fa8;
    color: #fff;
    font-size: 13px;
    padding: 6px 4px;
    border: 1px solid #999;
  }
  td {
    border: 1px solid #999;
    font-size: 13px;
    padding: 6px 4px;
    text-align: center;
    height: 26px;
  }
  td.rowhead {
    background: #29ABE2;
    color: #003366;
    font-weight: bold;
  }
  tr.empty td.rowhead {
    background: #29ABE2;
  }
  .btn-more {
    background: #999;
    color: #fff;
    border: none;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
  }
 
  /* scroll arrow */
  .scroll-arrow {
    position: absolute;
    right: -70px;
    top: 90px;
    width: 40px;
    height: 400px;
    background: #ddd;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    box-sizing: border-box;
  }
 
  .footer-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }
  button.register {
    background: #d9001b;
    color: #fff;
    font-weight: bold;
    font-size: 16px;
    padding: 10px 30px;
    border: none;
    cursor: pointer;
  }
</style>
